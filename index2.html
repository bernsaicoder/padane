<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PADANE Registration</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto',sans-serif;
}

body{
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:500px;
    background:white;
    border:1px solid #dadce0;
    border-radius:28px;
    padding:50px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo h1{
    color:#1a73e8;
    font-size:34px;
}

.logo p{
    color:#5f6368;
    margin-top:8px;
}

h2{
    text-align:center;
    margin-bottom:35px;
    font-weight:500;
    color:#202124;
}

.group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:7px;
    color:#5f6368;
    font-size:14px;
}

input{
    width:100%;
    padding:15px;
    border:1px solid #dadce0;
    border-radius:10px;
    font-size:16px;
    transition:.3s;
}

input:focus{
    outline:none;
    border:2px solid #1a73e8;
}

button{
    width:100%;
    background:#1a73e8;
    color:white;
    border:none;
    padding:16px;
    font-size:16px;
    border-radius:30px;
    cursor:pointer;
    transition:.3s;
    margin-top:15px;
}

button:hover{
    background:#1765cc;
}

.login{
    text-align:center;
    margin-top:20px;
    color:#5f6368;
}

.login a{
    color:#1a73e8;
    text-decoration:none;
    font-weight:500;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>PADANE 4.0</h1>
        <p>Personalized Assistive Device and Navigational Equipment</p>
    </div>

    <h2>Create your PADANE Account</h2>

    <div class="group">
        <label>Full Name</label>
        <input type="text" id="fullname">
    </div>

    <div class="group">
        <label>Address</label>
        <input type="text" id="address">
    </div>

    <div class="group">
        <label>Contact Person</label>
        <input type="text" id="contactperson">
    </div>

    <div class="group">
        <label>Contact Person Number</label>
        <input type="text" id="contactnumber">
    </div>

    <div class="group">
        <label>Username</label>
        <input type="text" id="username">
    </div>

    <div class="group">
        <label>Password</label>
        <input type="password" id="password">
    </div>

    <div class="group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword">
    </div>

    <button onclick="register()">
        Create Account
    </button>

    <div class="login">
        Already have an account?
        <a href="login.html">Sign in instead</a>
    </div>

</div>

<script>

function register(){

    let fullname=document.getElementById("fullname").value;
    let address=document.getElementById("address").value;
    let contactperson=document.getElementById("contactperson").value;
    let contactnumber=document.getElementById("contactnumber").value;
    let username=document.getElementById("username").value;
    let password=document.getElementById("password").value;
    let confirmPassword=document.getElementById("confirmPassword").value;

    if(password!==confirmPassword){
        alert("Passwords do not match.");
        return;
    }

    let user={
        fullname,
        address,
        contactperson,
        contactnumber,
        username,
        password
    };

    localStorage.setItem("padaneUser",JSON.stringify(user));

    alert("Registration Successful!");

    window.location.href="login.html";

}

</script>

</body>
</html>
